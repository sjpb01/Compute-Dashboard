name: Daily compute dashboard

# Rebuilds the tables + single-page dashboard once a day and commits the result.
# The EIA key is read from the repo secret EIA_API_KEY — never hard-coded.

on:
  schedule:
    - cron: "17 6 * * *"      # 06:17 UTC daily (offset from the top of the hour)
  workflow_dispatch: {}         # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write               # needed so the job can commit the refreshed dashboard

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build tables, CSVs, and dashboard
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}   # <- from repo secret, not in code
        run: python ingest.py

      - name: Commit refreshed dashboard + CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs out/*.csv
          # Only commit if something actually changed (avoids empty commits).
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily dashboard refresh ($(date -u +%F))"
            git push
          fi
